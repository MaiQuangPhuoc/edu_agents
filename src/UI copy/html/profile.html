<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile • StudyUI</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/profile.css" />

  </head>
  <body>
    <div id="app-header"></div>

    <main class="container page">
      <div class="page-title">
        <h1>Hồ sơ người dùng</h1>
        <div class="badge">Lưu tạm bằng LocalStorage</div>
      </div>

      <div class="grid-2">
        <section class="panel">
          <h3 style="margin:0 0 12px">Thông tin cơ bản</h3>
          <div style="display:flex; gap:16px; align-items:center; margin-bottom:16px">
            <div class="avatar" id="avatar">A</div>
            <div style="color:var(--muted); font-size:14px">
              Ảnh đại diện demo (chữ cái đầu tên)
            </div>
          </div>

          <div class="form-row">
            <label class="label" for="name">Họ và tên</label>
            <input id="name" class="input" placeholder="Nhập tên" />
          </div>

          <div class="grid-2" style="margin-top:12px">
            <div class="form-row">
              <label class="label" for="email">Email</label>
              <input id="email" class="input" placeholder="you@example.com" />
            </div>
            <div class="form-row">
              <label class="label" for="track">Lộ trình quan tâm</label>
              <select id="track" class="select">
                <option value="">— Chọn —</option>
                <option>Machine Learning</option>
                <option>Data Engineering</option>
                <option>Web Frontend</option>
                <option>Backend</option>
                <option>Mobile</option>
              </select>
            </div>
          </div>

          <div class="form-row" style="margin-top:12px">
            <label class="label" for="bio">Giới thiệu ngắn</label>
            <textarea id="bio" class="textarea" placeholder="Viết đôi dòng về bạn..."></textarea>
          </div>

          <div style="margin-top:14px; display:flex; gap:10px">
            <button id="save" class="btn btn-primary">Lưu hồ sơ</button>
            <button id="reset" class="btn">Xóa dữ liệu</button>
          </div>
        </section>

        <aside class="panel">
          <h3 style="margin:0 0 12px">Tóm tắt</h3>
          <p id="summary" style="color:var(--muted)">Chưa có thông tin hiển thị.</p>
          <div class="card-grid">
            <div class="card">
              <h3>Nhắc học</h3>
              <p>Đặt lịch học đều đặn giúp duy trì tiến độ.</p>
            </div>
            <div class="card">
              <h3>Mẹo nhỏ</h3>
              <p>Chia nhỏ mục tiêu theo tuần thay vì tháng.</p>
            </div>
            <div class="card">
              <h3>Tài nguyên</h3>
              <p>Tận dụng khóa học ngắn 30–60 phút.</p>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/main.js"></script>
    <script type="module" src="../js/profile.js"></script>
  </body>
</html>
