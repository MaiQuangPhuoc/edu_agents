  <main class="container page">
    <h1 id="plan-title" class="page-title"></h1>
    <p id="plan-scope" class="subtitle"></p>

    <!-- Constraints -->
    <div class="constraints">
      <div id="time-per-day" class="constraint-item"></div>
      <div id="days-per-week" class="constraint-item"></div>
      <div id="deadline" class="constraint-item"></div>
      <div id="max-chapter" class="constraint-item"></div>
    </div>

    <!-- Learner profile -->
    <div class="learner">
      <h2>Thông tin người học</h2>
      <ul>
        <li id="level"></li>
        <li id="style"></li>
        <li id="goal"></li>
        <li id="scope"></li>
      </ul>
    </div>

    <h2>Lộ trình học</h2>
    <div id="modules"></div>
  </main>
