<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tự đánh giá</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/tudanhgia.css" />
</head>
<body>
    <div id="app-header"></div>

    <div class="container">
        <h2>Tự đánh giá</h2>
        <div class="grid">
        <!-- Card 1 -->
        <div class="card">
            <h3>Chương: Toán cơ bản</h3>
            <div class="exercise">
            <label>Bài: Hàm số</label>
            <div class="options">
                <label><input type="checkbox" name="ex1"> Chưa hiểu</label>
                <label><input type="checkbox" name="ex1"> Hiểu</label>
                <label><input type="checkbox" name="ex1"> Hiểu rõ</label>
                <input type="text" placeholder="Nhập ghi chú...">
            </div>
            </div>
            <div class="exercise">
            <label>Bài: Phương trình</label>
            <div class="options">
                <label><input type="checkbox" name="ex2"> Chưa hiểu</label>
                <label><input type="checkbox" name="ex2"> Hiểu</label>
                <label><input type="checkbox" name="ex2"> Hiểu rõ</label>
                <input type="text" placeholder="Nhập ghi chú...">
            </div>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="card">
            <h3>Chương: Đại số</h3>
            <div class="exercise">
            <label>Bài: Hệ PT</label>
            <div class="options">
                <label><input type="checkbox" name="ex3"> Chưa hiểu</label>
                <label><input type="checkbox" name="ex3"> Hiểu</label>
                <label><input type="checkbox" name="ex3"> Hiểu rõ</label>
                <input type="text" placeholder="Nhập ghi chú...">
            </div>
            </div>
            <div class="exercise">
            <label>Bài: Bất phương trình</label>
            <div class="options">
                <label><input type="checkbox" name="ex4"> Chưa hiểu</label>
                <label><input type="checkbox" name="ex4"> Hiểu</label>
                <label><input type="checkbox" name="ex4"> Hiểu rõ</label>
                <input type="text" placeholder="Nhập ghi chú...">
            </div>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="card">
            <h3>Chương: Hình học</h3>
            <div class="exercise">
            <label>Bài: Góc</label>
            <div class="options">
                <label><input type="checkbox" name="ex5"> Chưa hiểu</label>
                <label><input type="checkbox" name="ex5"> Hiểu</label>
                <label><input type="checkbox" name="ex5"> Hiểu rõ</label>
                <input type="text" placeholder="Nhập ghi chú...">
            </div>
            </div>
            <div class="exercise">
            <label>Bài: Tam giác</label>
            <div class="options">
                <label><input type="checkbox" name="ex6"> Chưa hiểu</label>
                <label><input type="checkbox" name="ex6"> Hiểu</label>
                <label><input type="checkbox" name="ex6"> Hiểu rõ</label>
                <input type="text" placeholder="Nhập ghi chú...">
            </div>
            </div>
        </div>

        <!-- Card 4 -->
        <div class="card">
            <h3>Chương: Xác suất</h3>
            <div class="exercise">
            <label>Bài: Tổ hợp</label>
            <div class="options">
                <label><input type="checkbox" name="ex7"> Chưa hiểu</label>
                <label><input type="checkbox" name="ex7"> Hiểu</label>
                <label><input type="checkbox" name="ex7"> Hiểu rõ</label>
                <input type="text" placeholder="Nhập ghi chú...">
            </div>
            </div>
            <div class="exercise">
            <label>Bài: Xác suất</label>
            <div class="options">
                <label><input type="checkbox" name="ex8"> Chưa hiểu</label>
                <label><input type="checkbox" name="ex8"> Hiểu</label>
                <label><input type="checkbox" name="ex8"> Hiểu rõ</label>
                <input type="text" placeholder="Nhập ghi chú...">
            </div>
            </div>
        </div>
        </div>

        <div class="actions">
        <button id="saveBtn">Lưu đánh giá</button>
        <button id="testBtn">Đánh giá qua bài test</button>
        </div>
    </div>
    <div id="app-footer"></div>

    <script type="module" src="../js/main.js"></script>
    <script type="module" src="../js/tudanhgia.js"></script>
</body>
</html>
