<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chatbot • StudyUI</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/chat.css" />
  </head>
  <body>
    <div id="app-header"></div>

    <main class="container page">
      <div class="page-title">
        <h1>Trợ lý học tập</h1>
        <div class="badge">Chat demo • không backend</div>
      </div>

      <section class="chat panel" aria-label="Khu vực chat">
        <div id="chatBody" class="chat-body" role="log" aria-live="polite" aria-relevant="additions text">
          <!-- tin nhắn sẽ render bằng JS -->
        </div>

        <form id="chatForm" class="chat-input" autocomplete="off">
          <button type="button" id="plusBtn" class="btn-plus">+</button>
          <input id="chatText" class="input chat-text" placeholder="Nhập câu hỏi của bạn ..." />
          <button class="btn btn-primary" id="sendBtn" type="submit">Gửi</button>
        </form>

        <!-- menu lựa chọn -->
        <div id="optionMenu" class="option-menu hidden">
          <div class="option" data-value="1">Tạo kế hoạch học</div>
          <div class="option" data-value="2.1">Hỏi đáp kế hoạch</div>
          <div class="option" data-value="2.2">Hỏi đáp Toán 10</div>
        </div>

        <!-- hiển thị option đã chọn -->
        <div id="selectedOptions"></div>
      </section>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/main.js"></script>
    <script type="module" src="../js/chat.js"></script>
  </body>
</html>
