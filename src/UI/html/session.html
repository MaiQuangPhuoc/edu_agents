  <main>
    <div class="session-info">
      <div class="info-item">📅 <span id="session-date"></span></div>
      <div class="info-item">⚡ <span id="session-number"></span></div>
      <div class="info-item">⏰ Thời gian: <span id="session-time"></span></div>
    </div>

    <section class="lesson-detail">
      <h2>
        📌 Bài học: <span id="lesson-title"></span> 
        <span class="badge" id="lesson-plan"></span>
      </h2>
    </section>

    <section class="content">
      <div class="box">
        <h3>📘 Nội dung cần nắm</h3>
        <ul id="core-content"></ul>
      </div>

      <div class="box">
        <h3>💡 Đề xuất hoạt động</h3>
        <ul id="activities"></ul>
      </div>
    </section>

    <section class="exercise">
      <h3>✍️ Dạng bài tập</h3>
      <ul id="assignments"></ul>
    </section>

    <section class="resources">
      <h3>📂 Tài Nguyên</h3>
      <div id="resources"></div>
    </section>
  </main>
